<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Статичное интерактивное обучение сотрудников работе с платформой Nova"
    />
    <title>Nova Training</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      if (window.location.protocol !== "file:") {
        import("/src/main.tsx");
      }
    </script>
    <script>
      if (
        window.location.protocol === "file:" &&
        !window.location.pathname.replace(/\\/g, "/").includes("/dist/")
      ) {
        var stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "./src/styles.css";
        document.head.appendChild(stylesheet);

        var fallback = document.createElement("script");
        fallback.src = "./src/static-fallback.js";
        document.body.appendChild(fallback);
      }
    </script>
  </body>
</html>
