<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Anchor Pay — статичный учебный тренажер рабочего места для fintech-процессов"
    />
    <link rel="icon" type="image/svg+xml" href="./favicon-anchor-pay.svg" />
    <link rel="alternate icon" type="image/png" href="./anchor-pay-mark.png" />
    <link rel="apple-touch-icon" href="./anchor-pay-mark.png" />
    <title>Anchor Pay Training</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      if (window.location.protocol !== "file:") {
        import("/src/main.tsx");
      }
    </script>
    <script>
      if (
        window.location.protocol === "file:" &&
        !window.location.pathname.replace(/\\/g, "/").includes("/dist/")
      ) {
        document
          .querySelectorAll('link[rel="icon"], link[rel="apple-touch-icon"]')
          .forEach(function (link) {
            link.href = link.rel === "icon"
              ? "./public/favicon-anchor-pay.svg"
              : "./public/anchor-pay-mark.png";
          });

        var stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "./src/styles.css";
        document.head.appendChild(stylesheet);

        var fallback = document.createElement("script");
        fallback.src = "./src/static-fallback.js";
        document.body.appendChild(fallback);
      }
    </script>
  </body>
</html>
